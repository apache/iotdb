integration-test-1c3d:
  stage: test
  tags:
    - timechodb
  parallel: 2
  script:
    # Step 1: 按 CI_NODE_INDEX / CI_NODE_TOTAL 把 ClusterIT 类切成本 shard 的列表
    - |
      set -e
      echo "=== sharding ClusterIT for shard $CI_NODE_INDEX/$CI_NODE_TOTAL ==="
      grep -rlE '@Category[^/]*\bClusterIT\.class' integration-test/src/test --include='*.java' \
        | sed 's|.*/||;s|\.java$||' \
        | sort \
        | awk -v n="$CI_NODE_TOTAL" -v i="$CI_NODE_INDEX" 'NR % n == (i - 1) % n' \
        | paste -sd ',' - > shard_classes.txt
      echo "本 shard 类数: $(tr ',' '\n' < shard_classes.txt | wc -l)"
      echo "前 3 个类: $(tr ',' '\n' < shard_classes.txt | head -3)"
    # Step 2: 跑该 shard 的 IT
    - 'mvn verify -P with-integration-tests -DskipUTs -DintegrationTest.forkCount=6 -DConfigNodeMaxHeapSize=1024 -DDataNodeMaxHeapSize=1024 -pl integration-test -am -PClusterIT -Dit.test="$(cat shard_classes.txt)" -DfailIfNoTests=false -Dfailsafe.failIfNoSpecifiedTests=false -s $MAVEN_SETTINGS_XML'
  interruptible: true
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^rel/ || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^rc/

  artifacts:
    when: on_failure
    name: 1c3d-log
    paths:
      - integration-test/target/cluster-logs
    expire_in: 7 day

