version: "3"
services:
  timechodb-confignode-1:
    image: nexus.infra.timecho.com:8243/timecho/timechodb:version-standalone
    command: ["confignode"]
    hostname: timechodb-confignode-1
    container_name: timechodb-confignode-1
    # Set the memory limit for this container. Docker writes this value
    # to cgroup, and entrypoint.sh reads it to size JVM memory.
    # Tune it according to host resources and workload before production use.
    mem_limit: 2g
    environment:
      - cn_internal_address=timechodb-confignode-1
      - cn_internal_port=10710
      - cn_consensus_port=10720
      - cn_seed_config_node=timechodb-confignode-1:10710
      - schema_replication_factor=3
      - schema_region_consensus_protocol_class=org.apache.iotdb.consensus.ratis.RatisConsensus
      - config_node_consensus_protocol_class=org.apache.iotdb.consensus.ratis.RatisConsensus
    volumes:
      - ./data/confignode1:/iotdb/data
      - ./logs/confignode1:/iotdb/logs
    networks:
      timechodb:
        ipv4_address: 172.18.0.2

  timechodb-confignode-2:
    image: nexus.infra.timecho.com:8243/timecho/timechodb:version-standalone
    command: ["confignode"]
    hostname: timechodb-confignode-2
    container_name: timechodb-confignode-2
    # Set the memory limit for this container. Docker writes this value
    # to cgroup, and entrypoint.sh reads it to size JVM memory.
    # Tune it according to host resources and workload before production use.
    mem_limit: 2g
    environment:
      - cn_internal_address=timechodb-confignode-2
      - cn_internal_port=10710
      - cn_consensus_port=10720
      - cn_seed_config_node=timechodb-confignode-1:10710
      - schema_replication_factor=3
      - schema_region_consensus_protocol_class=org.apache.iotdb.consensus.ratis.RatisConsensus
      - config_node_consensus_protocol_class=org.apache.iotdb.consensus.ratis.RatisConsensus
    volumes:
      - ./data/confignode2:/iotdb/data
      - ./logs/confignode2:/iotdb/logs
    networks:
      timechodb:
        ipv4_address: 172.18.0.3

  timechodb-confignode-3:
    image: nexus.infra.timecho.com:8243/timecho/timechodb:version-standalone
    command: ["confignode"]
    hostname: timechodb-confignode-3
    container_name: timechodb-confignode-3
    # Set the memory limit for this container. Docker writes this value
    # to cgroup, and entrypoint.sh reads it to size JVM memory.
    # Tune it according to host resources and workload before production use.
    mem_limit: 2g
    environment:
      - cn_internal_address=timechodb-confignode-3
      - cn_internal_port=10710
      - cn_consensus_port=10720
      - cn_seed_config_node=timechodb-confignode-1:10710
      - schema_replication_factor=3
      - schema_region_consensus_protocol_class=org.apache.iotdb.consensus.ratis.RatisConsensus
      - config_node_consensus_protocol_class=org.apache.iotdb.consensus.ratis.RatisConsensus
    volumes:
      - ./data/confignode3:/iotdb/data
      - ./logs/confignode3:/iotdb/logs
    networks:
      timechodb:
        ipv4_address: 172.18.0.4

  timechodb-datanode-1:
    image: nexus.infra.timecho.com:8243/timecho/timechodb:version-standalone
    command: ["datanode"]
    hostname: timechodb-datanode-1
    container_name: timechodb-datanode-1
    # Set the memory limit for this container. Docker writes this value
    # to cgroup, and entrypoint.sh reads it to size JVM memory.
    # Tune it according to host resources and workload before production use.
    mem_limit: 8g
    ports:
      - "6667:6667"
    environment:
      - dn_rpc_address=timechodb-datanode-1
      - dn_internal_address=timechodb-datanode-1
      - dn_seed_config_node=timechodb-confignode-1:10710
      - dn_rpc_port=6667
      - dn_mpp_data_exchange_port=10740
      - dn_schema_region_consensus_port=10750
      - dn_data_region_consensus_port=10760
      - data_replication_factor=3
      - data_region_consensus_protocol_class=org.apache.iotdb.consensus.iot.IoTConsensus
    volumes:
      - ./data/datanode1:/iotdb/data/
      - ./logs/datanode1:/iotdb/logs/
    networks:
      timechodb:
        ipv4_address: 172.18.0.5

  timechodb-datanode-2:
    image: nexus.infra.timecho.com:8243/timecho/timechodb:version-standalone
    command: ["datanode"]
    hostname: timechodb-datanode-2
    container_name: timechodb-datanode-2
    # Set the memory limit for this container. Docker writes this value
    # to cgroup, and entrypoint.sh reads it to size JVM memory.
    # Tune it according to host resources and workload before production use.
    mem_limit: 8g
    environment:
      - dn_rpc_address=timechodb-datanode-2
      - dn_internal_address=timechodb-datanode-2
      - dn_seed_config_node=timechodb-confignode-1:10710
      - dn_rpc_port=6667
      - dn_mpp_data_exchange_port=10740
      - dn_schema_region_consensus_port=10750
      - dn_data_region_consensus_port=10760
      - data_replication_factor=3
      - data_region_consensus_protocol_class=org.apache.iotdb.consensus.iot.IoTConsensus
    volumes:
      - ./data/datanode2:/iotdb/data/
      - ./logs/datanode2:/iotdb/logs/
    networks:
      timechodb:
        ipv4_address: 172.18.0.6

  timechodb-datanode-3:
    image: nexus.infra.timecho.com:8243/timecho/timechodb:version-standalone
    command: ["datanode"]
    hostname: timechodb-datanode-3
    container_name: timechodb-datanode-3
    # Set the memory limit for this container. Docker writes this value
    # to cgroup, and entrypoint.sh reads it to size JVM memory.
    # Tune it according to host resources and workload before production use.
    mem_limit: 8g
    environment:
      - dn_rpc_address=timechodb-datanode-3
      - dn_internal_address=timechodb-datanode-3
      - dn_seed_config_node=timechodb-confignode-1:10710
      - dn_rpc_port=6667
      - dn_mpp_data_exchange_port=10740
      - dn_schema_region_consensus_port=10750
      - dn_data_region_consensus_port=10760
      - data_replication_factor=3
      - data_region_consensus_protocol_class=org.apache.iotdb.consensus.iot.IoTConsensus
    volumes:
      - ./data/datanode3:/iotdb/data/
      - ./logs/datanode3:/iotdb/logs/
    networks:
      timechodb:
        ipv4_address: 172.18.0.7

networks:
  timechodb:
    external: true
