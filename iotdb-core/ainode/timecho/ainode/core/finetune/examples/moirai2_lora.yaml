### model
model_type: moirai2
seq_len: 512
input_token_len: 512
output_token_lens:
  - 64

### method
finetune_type: lora
lora_rank: 2
lora_alpha: 8
lora_dropout: 0.1
lora_target_modules:
  - q_proj
  - v_proj

### dataset
dataset_type: csv
data_path: /path/to/electricity.csv

### training
num_train_epochs: 10
train_batch_size: 32
learning_rate: 1.0e-5
scheduler_type: cosine
use_amp: true
