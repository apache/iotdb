### model
model_type: sundial
seq_len: 2880
input_token_len: 16
output_token_lens:
  - 720

### method
finetune_type: weaver_cnn
freeze_backbone: true
input_channel: 16
output_channel: 64

### dataset
dataset_type: csv
data_path: /path/to/electricity.csv
multivariate: true

### training
num_train_epochs: 50
train_batch_size: 16
learning_rate: 1.0e-3
weight_decay: 0.01
gradient_accumulation_steps: 4
use_amp: true
